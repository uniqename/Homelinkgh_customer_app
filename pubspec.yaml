name: homelinkgh_customer
description: "HomeLinkGH - Connecting Ghanaians worldwide with trusted home services, food delivery, and essential support."
publish_to: 'none'

version: 4.1.8+55

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Environment
  flutter_dotenv: ^5.1.0

  # Backend
  supabase_flutter: ^2.5.6
  http: ^1.1.0

  # Firebase (push notifications)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_maps_flutter: ^2.5.0

  # Media
  image_picker: ^1.0.4

  # Auth
  local_auth: ^2.3.0

  # Storage & Prefs
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2

  # State management
  provider: ^6.1.1

  # UI
  fluttertoast: ^8.2.4
  flutter_local_notifications: ^17.2.3
  share_plus: ^12.0.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  url_launcher: ^6.2.2
  app_links: ^6.3.2
  dio: ^5.4.0

  # Tracking
  app_tracking_transparency: ^2.0.6+1

  # In-app browser (PayStack redirect)
  flutter_inappwebview: ^6.0.0

  # Payments
  flutterwave_standard: ^1.1.0
  flutter_paypal_payment: ^1.0.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/.env
